name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.18.1, cache: 'npm' }
      - name: Show versions
        run: node -v && npm -v && uname -a
      - name: Clean workspace (safety)
        run: rm -rf node_modules .next
      - name: Install deps (incl. optional native bindings)
        run: npm ci --foreground-scripts
        env:
          NPM_CONFIG_IGNORE_OPTIONAL: 'false'
      - name: Build
        run: npm run build